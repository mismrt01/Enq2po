<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRT ERP — Phase 1 Production Sequencer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,'Helvetica Neue',sans-serif;background:#E0E0E0;min-height:100vh;}

/* ===== APP SHELL ===== */
#mrtapp{display:flex;min-height:100vh;font-size:13px;color:#32363A;}

/* ===== SIDEBAR ===== */
#sb{width:200px;background:#354A5E;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:200;overflow:hidden;}
.sb-lg{height:48px;display:flex;align-items:center;gap:8px;padding:0 12px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
.sb-ic{width:28px;height:28px;border-radius:3px;background:#1B6DD2;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-ic i{font-size:16px;color:#fff;}
.sb-co{font-size:12px;font-weight:700;color:rgba(255,255,255,0.92);line-height:1.3;}
.sb-ap{font-size:9px;color:rgba(255,255,255,0.36);line-height:1.2;}
.sb-nv{flex:1;padding:4px 0;overflow-y:auto;}
.sg{font-size:9px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:1px;padding:10px 12px 3px;}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;color:rgba(255,255,255,0.6);border-left:3px solid transparent;transition:background 0.12s;}
.ni:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.9);}
.ni.act{background:rgba(27,109,210,0.35);color:#fff;border-left-color:#1B6DD2;}
.ni.dim{opacity:0.38;cursor:default;pointer-events:none;}
.ni i{font-size:15px;flex-shrink:0;}
.ni-t{font-size:12px;flex:1;}
.nb{background:#BB0000;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;min-width:16px;text-align:center;line-height:1.4;}
.nb.or{background:#E9730C;}
.nb.gr{background:#107E3E;}
.sb-usr{padding:8px 12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:7px;flex-shrink:0;}
.av{width:28px;height:28px;border-radius:50%;background:#1B6DD2;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-un{font-size:11px;color:rgba(255,255,255,0.72);}
.sb-ur{font-size:9px;color:rgba(255,255,255,0.3);}

/* ===== MAIN PANE ===== */
#main{flex:1;margin-left:200px;display:flex;flex-direction:column;min-height:100vh;min-width:0;}
#hdr{height:48px;background:#fff;border-bottom:1px solid #E4E5E6;display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0;}
#hdr-t{font-size:14px;font-weight:600;color:#32363A;flex:1;}
.hs{display:flex;align-items:center;gap:5px;background:#F7F7F7;border:1px solid #E4E5E6;border-radius:3px;padding:4px 8px;}
.hs i{font-size:13px;color:#6A6D70;}
.hs input{border:none;background:none;font-size:12px;color:#32363A;outline:none;width:140px;}
.hb{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:3px;cursor:pointer;color:#6A6D70;border:none;background:none;position:relative;}
.hb:hover{background:#F0F0F0;}
.hb i{font-size:16px;}
.nd{position:absolute;top:4px;right:4px;width:7px;height:7px;background:#BB0000;border-radius:50%;border:2px solid #fff;}
.hav{width:28px;height:28px;border-radius:50%;background:#0A6ED1;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;cursor:pointer;}
#bc{font-size:11px;color:#6A6D70;padding:5px 16px;border-bottom:1px solid #EBEBEB;background:#fff;display:flex;align-items:center;gap:5px;flex-shrink:0;}
#cnt{flex:1;background:#F7F7F7;padding:12px 16px;overflow-y:auto;}

/* ===== KPI CARDS ===== */
.kr{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.kpi{background:#fff;border:1px solid #E4E5E6;border-radius:3px;padding:12px 14px;border-top:3px solid #E4E5E6;}
.kpi.bl{border-top-color:#0A6ED1;}
.kpi.gr{border-top-color:#107E3E;}
.kpi.rd{border-top-color:#BB0000;}
.kpi.or{border-top-color:#E9730C;}
.kv{font-size:26px;font-weight:300;color:#32363A;line-height:1;}
.kl{font-size:10px;color:#6A6D70;margin-top:3px;}
.kd{font-size:10px;margin-top:5px;}
.kd.p{color:#107E3E;}
.kd.n{color:#BB0000;}
.kd.w{color:#E9730C;}

/* ===== ALERT BARS ===== */
.abar{border-radius:3px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px;}
.abar.er{background:#FFF1F0;border:1px solid #FFCDD2;color:#BB0000;}
.abar.wn{background:#FFF8EC;border:1px solid #FFE0B2;color:#E9730C;}
.abar.info{background:#E8F0FD;border:1px solid #C2D8F8;color:#0A6ED1;}
.abar.ok{background:#F1F8E9;border:1px solid #C5E1A5;color:#107E3E;}
.abar i{font-size:15px;flex-shrink:0;}
.abar-body{flex:1;}
.abar-act{margin-left:auto;background:#BB0000;color:#fff;border:none;padding:3px 10px;border-radius:3px;font-size:11px;cursor:pointer;white-space:nowrap;}
.abar-act:hover{background:#8E0000;}

/* ===== PRESS BOARD ===== */
.pb{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.pc{background:#fff;border:1px solid #E4E5E6;border-radius:3px;padding:10px 12px;}
.pc.em-press{border-left:3px solid #BB0000;border-color:#FFCDD2;}
.pc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
.pc-nm{font-size:9px;font-weight:700;color:#6A6D70;text-transform:uppercase;letter-spacing:0.5px;}
.dt{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dt.r{background:#107E3E;}
.dt.i{background:#C0C0C0;}
.dt.s{background:#E9730C;}
.pc-jb{font-size:12px;font-weight:600;color:#32363A;margin-bottom:2px;}
.pc-ds{font-size:10px;color:#6A6D70;margin-bottom:6px;line-height:1.4;}
.pg{height:4px;background:#EBEBEB;border-radius:2px;}
.pg-f{height:100%;border-radius:2px;transition:width 0.4s;}
.pg-f.r{background:#107E3E;}
.pg-f.i{background:#C0C0C0;}
.pg-f.s{background:#E9730C;}
.pc-mt{font-size:9px;color:#6A6D70;margin-top:4px;}
.pc-act{margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;}

/* ===== TABLES ===== */
.tc{background:#fff;border:1px solid #E4E5E6;border-radius:3px;margin-bottom:10px;overflow:hidden;}
.tc-hd{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #E4E5E6;flex-wrap:wrap;}
.tc-tt{font-size:12px;font-weight:600;color:#32363A;flex:1;}
.tc-ct{font-size:11px;color:#6A6D70;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:600;color:#6A6D70;text-align:left;padding:7px 10px;border-bottom:1px solid #E4E5E6;background:#FAFAFA;text-transform:uppercase;letter-spacing:0.2px;white-space:nowrap;}
td{font-size:12px;color:#32363A;padding:7px 10px;border-bottom:1px solid #F3F3F3;white-space:nowrap;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.jr:hover td{background:#EEF4FF;cursor:pointer;}
.empty-row td{text-align:center;color:#6A6D70;padding:20px;font-style:italic;}

/* ===== BADGES ===== */
.b{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:2px;line-height:1.5;}
.bok{background:#E8F5E9;color:#107E3E;}
.bwn{background:#FFF3E0;color:#E9730C;}
.ber{background:#FFEBEE;color:#BB0000;}
.bif{background:#E8F0FD;color:#0A6ED1;}
.bnt{background:#F5F6F7;color:#6A6D70;border:1px solid #E4E5E6;}
.bem{background:#BB0000;color:#fff;}
.llt{color:#BB0000;font-weight:600;}
.lwn{color:#E9730C;font-weight:500;}
.lok{color:#107E3E;}

/* ===== BUTTONS ===== */
.bp{background:#0A6ED1;color:#fff;border:none;padding:5px 11px;border-radius:3px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;line-height:1.4;}
.bp:hover{background:#085EA8;}
.bp i{font-size:12px;}
.bp.gr{background:#107E3E;}.bp.gr:hover{background:#0B5C2A;}
.bp.rd{background:#BB0000;}.bp.rd:hover{background:#8E0000;}
.bp.or{background:#E9730C;}.bp.or:hover{background:#BF5D08;}
.bp.sm{padding:3px 8px;font-size:10.5px;}
.bg{background:#fff;color:#0A6ED1;border:1px solid #0A6ED1;padding:5px 11px;border-radius:3px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.bg:hover{background:#EEF4FF;}
.bg.sm{padding:3px 8px;font-size:10.5px;}
.bgr{background:#fff;color:#107E3E;border:1px solid #107E3E;padding:5px 11px;border-radius:3px;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.bgr:hover{background:#F1F8E9;}
.bgr.sm{padding:3px 8px;font-size:10.5px;}

/* ===== SUB-TABS ===== */
.stabs{display:flex;background:#fff;border:1px solid #E4E5E6;border-radius:3px 3px 0 0;border-bottom:none;overflow-x:auto;}
.st{padding:9px 13px;font-size:11.5px;color:#6A6D70;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.st:hover{color:#32363A;background:#F7F7F7;}
.st.a{color:#0A6ED1;border-bottom-color:#0A6ED1;font-weight:500;}
.st .sn{display:inline-block;background:#EDEDEE;color:#6A6D70;font-size:9px;padding:1px 5px;border-radius:8px;line-height:1.5;}
.st.a .sn{background:#E8F0FD;color:#0A6ED1;}
.tb{background:#fff;border:1px solid #E4E5E6;border-top:none;border-radius:0 0 3px 3px;overflow:hidden;}

/* ===== CAPACITY ROW ===== */
.cap-row{display:flex;align-items:center;gap:10px;padding:8px 12px;font-size:12px;color:#32363A;background:#FAFAFA;border-bottom:1px solid #E4E5E6;flex-wrap:wrap;}
.cnt-btn{width:24px;height:24px;border:1px solid #E4E5E6;border-radius:3px;background:#fff;cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;line-height:1;}
.cnt-btn:hover{background:#F0F0F0;}
.cnt-val{font-weight:700;font-size:14px;min-width:22px;text-align:center;color:#32363A;}

/* ===== ACTION BAR ===== */
.actl{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}

/* ===== OTD TREND ===== */
.trend-wrap{padding:10px 16px 0;}
.trend-bar-row{display:flex;align-items:flex-end;gap:2px;height:64px;}
.tbar{flex:1;border-radius:2px 2px 0 0;min-width:6px;cursor:default;position:relative;}
.tbar:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:#32363A;color:#fff;font-size:10px;padding:2px 6px;border-radius:2px;white-space:nowrap;pointer-events:none;z-index:10;}
.trend-label-row{display:flex;gap:2px;padding:3px 0 6px;font-size:9px;color:#6A6D70;}
.trend-label-row span{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;}
.trend-legend{display:flex;gap:12px;padding:0 0 10px;font-size:10px;color:#6A6D70;}
.tleg{display:flex;align-items:center;gap:4px;}
.tleg-dot{width:10px;height:10px;border-radius:1px;}

/* ===== MODAL ===== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:4px;box-shadow:0 8px 32px rgba(0,0,0,0.2);width:500px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;}
.modal-hd{padding:14px 16px;border-bottom:1px solid #E4E5E6;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.modal-tt{font-size:14px;font-weight:600;color:#32363A;flex:1;}
.modal-cl{background:none;border:none;cursor:pointer;color:#6A6D70;font-size:18px;display:flex;padding:0;}
.modal-cl:hover{color:#32363A;}
.modal-bd{padding:16px;overflow-y:auto;}
.modal-ft{padding:10px 16px;border-top:1px solid #E4E5E6;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;}

/* ===== FORM CONTROLS ===== */
.form-row{margin-bottom:12px;}
.form-lbl{font-size:11px;color:#6A6D70;margin-bottom:4px;display:block;font-weight:500;}
.form-inp{width:100%;border:1px solid #E4E5E6;border-radius:3px;padding:6px 9px;font-size:12px;color:#32363A;outline:none;font-family:Arial,sans-serif;}
.form-inp:focus{border-color:#0A6ED1;box-shadow:0 0 0 2px rgba(10,110,209,0.1);}
.form-sel{width:100%;border:1px solid #E4E5E6;border-radius:3px;padding:6px 9px;font-size:12px;color:#32363A;outline:none;background:#fff;font-family:Arial,sans-serif;}
.form-sel:focus{border-color:#0A6ED1;}
.form-inp.inline{width:auto;}

/* ===== PRESS SELECTION GRID ===== */
.press-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.press-opt{border:2px solid #E4E5E6;border-radius:3px;padding:9px 11px;cursor:pointer;transition:border-color 0.15s,background 0.15s;}
.press-opt:hover{border-color:#0A6ED1;}
.press-opt.sel{border-color:#0A6ED1;background:#EEF4FF;}
.press-opt.busy{opacity:0.5;cursor:not-allowed;pointer-events:none;}
.press-opt-nm{font-size:11px;font-weight:600;color:#32363A;}
.press-opt-st{font-size:10px;margin-top:3px;}

/* ===== DETAIL VIEW ===== */
.det-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#0A6ED1;cursor:pointer;margin-bottom:8px;background:none;border:none;padding:0;}
.det-back:hover{text-decoration:underline;}
.det-back i{font-size:13px;}
.det-hd{background:#fff;border:1px solid #E4E5E6;border-radius:3px 3px 0 0;padding:12px 14px;border-bottom:1px solid #E4E5E6;}
.det-tt{font-size:15px;font-weight:600;color:#32363A;}
.det-su{font-size:11px;color:#6A6D70;margin-top:3px;}
.det-fl{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;background:#fff;border:1px solid #E4E5E6;border-top:none;border-radius:0 0 3px 3px;padding:12px 14px;margin-bottom:10px;}
.dfl{font-size:10px;color:#6A6D70;margin-bottom:2px;}
.dfv{font-size:12.5px;font-weight:500;color:#32363A;}

/* ===== OTD RESULT ===== */
.otd-on{color:#107E3E;font-weight:600;}
.otd-late{color:#BB0000;font-weight:600;}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:3px;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.18);transition:opacity 0.3s;max-width:400px;display:none;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#F7F7F7;}
::-webkit-scrollbar-thumb{background:#C8C8C8;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#A0A0A0;}
</style>
</head>
<body>

<!-- ============================================================
     APP SHELL
     ============================================================ -->
<div id="mrtapp">

  <!-- SIDEBAR -->
  <aside id="sb">
    <div class="sb-lg">
      <div class="sb-ic"><i class="ti ti-atom"></i></div>
      <div>
        <div class="sb-co">MRT ERP</div>

  <!-- MAIN -->
  <div id="main">

      <span id="hdr-t">Dashboard</span>
      <div class="hs">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Search jobs, customers...">

      <button class="hb" title="Notifications"><i class="ti ti-bell"></i><div class="nd"></div></button>
      <button class="hb" title="Help"><i class="ti ti-help"></i></button>
      <div class="hav" title="Akki · Administrator">AK</div>
    </div>
    <div id="bc">
      <i class="ti ti-home"></i>&nbsp;MRT ERP&nbsp;
      <i class="ti ti-chevron-right"></i>&nbsp;<span id="bc-p">Dashboard</span>
    </div>
    <div id="cnt"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeMBg(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hd">
      <span class="modal-tt" id="modal-title">—</span>
      <button class="modal-cl" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-bd" id="modal-body"></div>
    <div class="modal-ft" id="modal-foot"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

/* ============================================================
   SECTION 4 — HELPERS
   ============================================================ */

function fmtDate(ds){
  if(!ds) return '—';
  const d=new Date(ds+'T00:00:00');
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function lsdClass(ds){
  if(!ds) return '';
  const d=new Date(ds+'T00:00:00');
  const today=new Date('2026-05-13T00:00:00');
  const diff=Math.floor((d-today)/(1000*60*60*24));
  if(diff<0) return 'llt';
  if(diff<=1) return 'lwn';
  return 'lok';
}

function statusBadge(s){
  const map={
    'running':['bok','Running'],
    'setup':['bwn','Setting Up'],
    'idle':['bnt','Idle'],
    'queued':['bnt','Queued'],
    'in-progress':['bok','In Progress'],
    'passed':['bok','Passed'],
    'pending':['bnt','Pending'],
    'ncr':['ber','NCR Raised'],
    'awaiting':['bnt','Awaiting PDI'],
    'in-review':['bwn','In Review'],
    'ready':['bif','Ready'],
    'dispatched':['bok','Dispatched'],
    'late':['ber','Late']
  };
  const [cls,lbl]=map[s]||['bnt',s];
  return `<span class="b ${cls}">${lbl}</span>`;
}

function emBadge(j){ return j.priority==='emergency'?'<span class="b bem">🔴 EMERGENCY</span> ':''; }

function showToast(msg, type='ok'){
  const t=document.getElementById('toast');
  const bg=type==='ok'?'#107E3E':type==='err'?'#BB0000':'#E9730C';
  t.style.cssText=`display:block;background:${bg};color:#fff;`;
  t.textContent=msg;
  clearTimeout(t._tmr);
  t._tmr=setTimeout(()=>{ t.style.opacity='0'; setTimeout(()=>{ t.style.display='none'; t.style.opacity='1'; },300); },3000);
}

function openModal(title, bodyHTML, footHTML){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHTML;
  document.getElementById('modal-foot').innerHTML=footHTML||'';
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){ document.getElementById('modal-bg').classList.remove('show'); }
function closeMBg(e){ if(e.target===document.getElementById('modal-bg')) closeModal(); }

function updateSidebarCount(){
  const wip=JOBS.filter(j=>!['dispatch'].includes(j.stage)).length;
  const el=document.getElementById('sb-wip-ct');
  if(el){ el.textContent=wip; el.style.display=wip?'':'none'; }
}

function renderInspection(){
  const jobs = JOBS.filter(j=>j.stage==='inspection')
    .sort((a,b)=>{
      if(a.priority==='emergency') return -1;
      if(b.priority==='emergency') return 1;
      return new Date(a.lsd)-new Date(b.lsd);
    });
  const impact = getOTDImpact().filter(x=>x.job.stage==='inspection');

  const capRow = `<div class="cap-row">
    <span>Inspectors today:</span>
    <button class="cnt-btn" onclick="chgInspectors(-1)">−</button>
    <span class="cnt-val" id="i-cnt">${STATE.inspectors}</span>
    <button class="cnt-btn" onclick="chgInspectors(1)">+</button>
    <span style="color:#6A6D70;margin-left:4px">· Shift hrs left: <strong>${STATE.shiftHoursLeft}h</strong></span>
    ${impact.filter(x=>x.risk!=='safe').length
      ?`<span class="b ber" style="margin-left:8px">⚠ ${impact.filter(x=>x.risk==='breach').length} breach</span>`:''}
    <span style="margin-left:auto;color:#6A6D70">${jobs.filter(j=>j.status==='pending').length} lots awaiting inspection</span>
  </div>`;

  const rows = jobs.map(j=>{
    const prod = PRODUCTS.find(p=>p.name===j.product||p.code===j.product);
    const imp  = impact.find(x=>x.job.id===j.id);
    const qtyDone = j.qtyDone||0;
    const qtyRem  = j.qty - qtyDone;
    const pph = prod ? prod.inspRate * STATE.inspectors : null;
    const remHrs = (pph && qtyRem>0) ? (qtyRem/pph) : null;
    const projEndStr = imp ? imp.projEnd.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+' '+imp.projEnd.toLocaleDateString('en-IN',{day:'numeric',month:'short'}) : '—';
    const riskCls = imp?.risk==='breach'?'llt':imp?.risk==='atrisk'?'lwn':'';
    const pctDone = j.qty>0 ? Math.round((qtyDone/j.qty)*100) : 0;
    const otSugg = imp && imp.risk!=='safe' && imp.otHrs>0
      ? `<div style="font-size:9px;color:#E9730C;margin-top:2px">+${imp.otHrs}h OT to recover</div>` : '';

    return `<tr class="jr" onclick="openJobDetail('${j.id}')">
      <td>${emBadge(j)}<span style="color:#0A6ED1;font-weight:600">${j.id}</span></td>
      <td>${j.product}</td>
      <td>${j.customer}</td>
      <td>
        <div style="font-size:11px">${j.qty.toLocaleString()} pcs</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
          <div style="flex:1;height:4px;background:#EBEBEB;border-radius:2px;min-width:50px">
            <div style="width:${pctDone}%;height:100%;background:#107E3E;border-radius:2px"></div>
          </div>
          <span style="font-size:10px;color:#107E3E;font-weight:600">${pctDone}%</span>
        </div>
      </td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" min="0" max="${j.qty}" value="${qtyDone}"
            style="width:65px;padding:3px 5px;font-size:11px;border:1px solid #E4E5E6;border-radius:3px"
            onchange="updateQtyDone('${j.id}',this.value,'inspection')" onclick="event.stopPropagation()">
          <span style="font-size:10px;color:#6A6D70">/ ${j.qty.toLocaleString()}</span>
        </div>
      </td>
      <td style="font-size:11px">${prod?`${prod.inspRate} pcs/insp/hr · ×${STATE.inspectors}=${pph?pph.toFixed(0):'—'}`:'-'}</td>
      <td style="font-size:11px">${remHrs!=null?`${remHrs.toFixed(1)} hrs`:'—'}</td>
      <td class="${riskCls}" style="font-size:11px">${projEndStr}${otSugg}</td>
      <td>${j.batch||'—'}</td>
      <td>${j.inspector||'—'}</td>
      <td>${statusBadge(j.status==='passed'?'passed':j.status==='ncr'?'ncr':j.result==='pending'?'pending':j.status)}</td>
      <td onclick="event.stopPropagation()" style="display:flex;gap:5px;align-items:center;padding:7px 10px;">
        ${j.status==='pending'
          ?`<button class="bp sm gr" onclick="passInspection('${j.id}')"><i class="ti ti-check"></i> Pass</button>
             <button class="bp sm rd" onclick="failInspection('${j.id}')"><i class="ti ti-x"></i> Fail</button>`
          :j.status==='passed'
          ?`<button class="bp sm" onclick="advanceStage('${j.id}','inspection','pdi')"><i class="ti ti-arrow-right"></i> To PDI</button>`
          :j.status==='ncr'
          ?`<button class="bp sm or" onclick="rerouteRework('${j.id}')"><i class="ti ti-refresh"></i> Rework</button>`:'—'}
      </td>
    </tr>`;
  }).join('');

  return `<div class="tb">
    ${capRow}
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Lot / Job</th><th>Product</th><th>Customer</th><th>Total Qty</th>
        <th>Pcs Done ✎</th><th>Rate</th><th>Rem. TAT</th><th>Proj. End</th>
        <th>Batch</th><th>Inspector</th><th>Result</th><th>Action</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

/* ============================================================
   SECTION 11 — PRODUCTION SEQUENCER WRAPPER
   ============================================================ */

const STAGE_TABS = [
  { k:'shift',    label:'🌅 Shift Briefing',     countStage:null          },
  { k:'mould',    label:'Moulding',              countStage:'moulding'    },
  { k:'finish',   label:'Finishing',             countStage:'finishing'   },
  { k:'insp',     label:'Inspection',            countStage:'inspection'  },
  { k:'pdi',      label:'PDI Awaiting',          countStage:'pdi'        },
  { k:'dispatch', label:'Ready to Dispatch',     countStage:'dispatch'   },
];

function renderProduction(){
  const tabBar = `<div class="stabs">
    ${STAGE_TABS.map(t=>{
      const cnt = JOBS.filter(j=>j.stage===t.countStage).length;
      const isActive = STATE.activeTab===t.k;
      const hasEm = t.countStage==='moulding' && JOBS.some(j=>j.stage==='moulding'&&j.priority==='emergency');
      return `<div class="st${isActive?' a':''}" onclick="spt('${t.k}')">
        ${hasEm?'🔴 ':''}${t.label}
        <span class="sn">${cnt}</span>
      </div>`;
    }).join('')}
  </div>
  <div id="ptb"></div>`;

  document.getElementById('cnt').innerHTML = tabBar;
  spt(STATE.activeTab);
}

function spt(k){
  STATE.activeTab = k;
  document.querySelectorAll('.st').forEach(t=>t.classList.toggle('a', t.textContent.trim().startsWith(STAGE_TABS.find(s=>s.k===k)?.label||'__NONE__') || t.getAttribute('onclick')=== `spt('${k}')`));
  // Re-render tabs cleanly
  document.querySelectorAll('.st').forEach(t=>{
    const onclick = t.getAttribute('onclick');
    t.classList.toggle('a', onclick && onclick.includes(`'${k}'`));
  });
  const renderFn = {shift:renderShiftBriefing,mould:renderMoulding,finish:renderFinishing,insp:renderInspection,pdi:renderPDI,dispatch:renderDispatch};
  const ptb = document.getElementById('ptb');
  if(ptb && renderFn[k]) ptb.innerHTML = renderFn[k]();
}


/* ============================================================
   SECTION 12 — ACTIONS & MODALS
   ============================================================ */

function chgFinishers(d){
  STATE.finishers = Math.max(1, Math.min(30, STATE.finishers+d));
  spt(STATE.activeTab); // full re-render — recalculates all projections
}
function chgInspectors(d){
  STATE.inspectors = Math.max(1, Math.min(15, STATE.inspectors+d));
  spt(STATE.activeTab);
}
function updateQtyDone(jobId, val, stage){
  const job = JOBS.find(j=>j.id===jobId);
  if(!job) return;
  const v = Math.max(0, Math.min(job.qty, parseInt(val)||0));
  job.qtyDone = v;
  showToast(`${jobId}: ${v.toLocaleString()} pcs recorded`,'ok');
  spt(STATE.activeTab); // recalc all projections live
}

function advanceStage(jobId, fromStage, toStage){
  const job = JOBS.find(j=>j.id===jobId);
  if(!job) return;
  job.stage = toStage;
  const stageLabel={moulding:'Moulding',finishing:'Finishing',inspection:'Inspection',pdi:'PDI Awaiting',dispatch:'Ready to Dispatch'};
  showToast(`✓ ${jobId} advanced to ${stageLabel[toStage]||toStage}`,'ok');
  updateSidebarCount();
  if(document.querySelector('.stabs')) spt(STATE.activeTab);
  else renderDashboard();
}

function completeMoulding(jobId){
  advanceStage(jobId,'moulding','finishing');
  const press = PRESSES.find(p=>p.job===jobId);
  if(press){ press.status='idle'; press.job=null; press.product=null; press.customer=null; press.pct=0; press.eta='Awaiting next job'; press.emergency=false; }
}

function markMouldComplete(pressId){
  const press = PRESSES.find(p=>p.id===pressId);
  if(!press||!press.job) return;
  if(press.status==='setup'){ press.status='running'; press.pct=5; press.eta='~35 min'; showToast(`✓ ${press.name} marked Running — ${press.job}`,'ok'); spt('mould'); return; }
  completeMoulding(press.job);
}

function passInspection(jobId){
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  job.status='passed'; job.result='passed';
  showToast(`✓ ${jobId} Inspection Passed — advancing to PDI`,'ok');
  setTimeout(()=>advanceStage(jobId,'inspection','pdi'),600);
}

function failInspection(jobId){
  openModal('Raise NCR — '+jobId,
    `<div class="form-row"><label class="form-lbl">Defect Description</label><input class="form-inp" id="ncr-desc" placeholder="Describe the defect observed…"></div>
     <div class="form-row"><label class="form-lbl">Defect Code</label>
     <select class="form-sel" id="ncr-code">
       <option value="">Select defect code…</option>
       <option>DC-01 — Flash / Burr</option>
       <option>DC-02 — Short Shot</option>
       <option>DC-03 — Dimension Out of Tolerance</option>
       <option>DC-04 — Surface Defect</option>
       <option>DC-05 — Hardness Out of Range</option>
       <option>DC-06 — Compound Contamination</option>
       <option>DC-07 — Other</option>
     </select></div>
     <div class="form-row"><label class="form-lbl">Responsible Stage</label>
     <select class="form-sel" id="ncr-stage">
       <option>Moulding</option><option>Finishing</option><option>Material / Compound</option>
     </select></div>
     <div class="form-row"><label class="form-lbl">Action</label>
     <select class="form-sel" id="ncr-action">
       <option value="rework">Send to Rework (re-enter Finishing queue)</option>
       <option value="reject">Reject Batch</option>
     </select></div>`,
    `<button class="bg" onclick="closeModal()">Cancel</button>
     <button class="bp rd" onclick="submitNCR('${jobId}')"><i class="ti ti-alert-triangle"></i> Raise NCR & Rework</button>`
  );
}

function submitNCR(jobId){
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  job.status='ncr'; job.result='ncr';
  showToast(`⚠ NCR raised for ${jobId} — routed to Rework`,'warn');
  closeModal();
  spt('insp');
}

function rerouteRework(jobId){
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  job.stage='finishing'; job.status='queued'; job.elapsed='—'; job.tatAllowed='Rework';
  showToast(`↩ ${jobId} re-entered Finishing queue for Rework`,'warn');
  updateSidebarCount();
  spt('insp');
}

function approvePDI(jobId){
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  const ts = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  openModal('Approve PDI — '+jobId,
    `<div style="font-size:13px;color:#32363A;margin-bottom:12px">
      Approving PDI will move <strong>${jobId}</strong> to <strong>Ready to Dispatch</strong>.
     </div>
     <div class="form-row"><label class="form-lbl">PDI Officer Name</label>
     <input class="form-inp" id="pdi-officer" placeholder="Enter your name"></div>
     <div class="form-row"><label class="form-lbl">PDI Timestamp</label>
     <input class="form-inp" value="13 May 2026 · ${ts}" readonly style="background:#FAFAFA;color:#6A6D70"></div>
     <div class="abar ok" style="margin-top:8px"><i class="ti ti-check"></i> All inspection criteria met. Approving will enable dispatch confirmation.</div>`,
    `<button class="bg" onclick="closeModal()">Cancel</button>
     <button class="bp gr" onclick="doPDIApprove('${jobId}')"><i class="ti ti-circle-check"></i> Approve & Move to Dispatch</button>`
  );
}

function doPDIApprove(jobId){
  const off = document.getElementById('pdi-officer')?.value||'Officer';
  advanceStage(jobId,'pdi','dispatch');
  const job=JOBS.find(j=>j.id===jobId);
  if(job){ job.pdiOfficer=off; job.status='ready'; job.dispatchBy=''; job.consignment=''; job.otd=null; }
  closeModal();
}

function confirmDispatch(jobId){
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  const courier = document.getElementById('courier-'+jobId)?.value||job.dispatchBy||'';
  const cons = document.getElementById('cons-'+jobId)?.value||job.consignment||'';
  if(!courier){ showToast('Please select a courier first','warn'); return; }
  const promDate = new Date(job.promised+'T23:59:59');
  const now = new Date('2026-05-13T10:30:00');
  const onTime = now <= promDate;
  const ts = '13 May · 10:'+Math.floor(Math.random()*59).toString().padStart(2,'0');
  openModal('Confirm Dispatch — '+jobId,
    `<div style="font-size:13px;margin-bottom:12px">
      <p>Confirming dispatch for <strong>${jobId}</strong>:</p>
      <p style="margin-top:6px;color:#6A6D70">${job.product} · ${job.qty} pcs · ${job.customer}</p>
     </div>
     <div class="det-fl" style="padding:10px;border-radius:3px;border:1px solid #E4E5E6;margin-bottom:10px;grid-template-columns:1fr 1fr;">
       <div><div class="dfl">Courier</div><div class="dfv">${courier}</div></div>
       <div><div class="dfl">Consignment</div><div class="dfv">${cons||'—'}</div></div>
       <div><div class="dfl">Promised Date</div><div class="dfv">${fmtDate(job.promised)}</div></div>
       <div><div class="dfl">OTD Result</div><div class="dfv ${onTime?'otd-on':'otd-late'}">${onTime?'✓ On Time':'✗ Late'}</div></div>
     </div>
     <div class="abar ${onTime?'ok':'er'}"><i class="ti ti-${onTime?'check':'alert-triangle'}"></i> 
       ${onTime?'This dispatch will be recorded as <strong>On Time</strong>.':'This dispatch will be recorded as <strong>Late</strong>. OTD % will be impacted.'}
     </div>`,
    `<button class="bg" onclick="closeModal()">Cancel</button>
     <button class="bp gr" onclick="doDispatch('${jobId}','${courier}','${cons}','${onTime}')"><i class="ti ti-truck"></i> Confirm Dispatch</button>`
  );
}

function doDispatch(jobId, courier, cons, onTime){
  const job=JOBS.find(j=>j.id===jobId); if(!job) return;
  job.status='dispatched';
  job.otd = (onTime==='true'||onTime===true)?'on-time':'late';
  job.dispatchBy=courier;
  job.consignment=cons||'—';
  job.dispatchedAt='13 May · 10:31';
  closeModal();

function openAssignModal(pressId, jobId){
  const availJobs = JOBS.filter(j=>j.stage==='moulding'&&!j.press)
    .sort((a,b)=>{ if(a.priority==='emergency')return -1; if(b.priority==='emergency')return 1; return new Date(a.lsd)-new Date(b.lsd); });
  const availPresses = PRESSES.filter(p=>p.status==='idle');

  openModal('Assign Job to Press',
    `<div class="form-row">
      <label class="form-lbl">Select Job <span style="color:#BB0000">*</span></label>
      <select class="form-sel" id="assign-job">
        <option value="">— Select job (sorted by LSD) —</option>
        ${availJobs.map(j=>`<option value="${j.id}" ${jobId===j.id?'selected':''}>
          ${j.priority==='emergency'?'🔴 ':''}${j.id} — ${j.product} · ${j.customer} · LSD ${fmtDate(j.lsd)}
        </option>`).join('')}
      </select>
     </div>
     <div class="form-row">
      <label class="form-lbl">Select Press <span style="color:#BB0000">*</span></label>
      <div class="press-grid">
        ${PRESSES.map(p=>`
          <div class="press-opt${p.status!=='idle'?' busy':''} ${pressId===p.id?' sel':''}" onclick="selectPress(this,'${p.id}')">
            <div class="press-opt-nm">${p.name} · ${p.tonnage}</div>
            <div class="press-opt-st" style="color:${p.status==='idle'?'#107E3E':'#BB0000'}">
              ${p.status==='idle'?'✓ Available':'✗ '+p.status}
            </div>
          </div>`).join('')}
      </div>
      <input type="hidden" id="assign-press" value="${pressId||''}">
     </div>`,
    `<button class="bg" onclick="closeModal()">Cancel</button>
     <button class="bp" onclick="doAssignPress()"><i class="ti ti-circle-arrow-right"></i> Assign to Press</button>`
  );
}

function selectPress(el, pressId){
  document.querySelectorAll('.press-opt').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('assign-press').value=pressId;
}

function doAssignPress(){
  const jobId = document.getElementById('assign-job')?.value;
  const pressId = document.getElementById('assign-press')?.value;
  if(!jobId){ showToast('Please select a job','warn'); return; }
  if(!pressId){ showToast('Please select a press','warn'); return; }
  const job=JOBS.find(j=>j.id===jobId);
  const press=PRESSES.find(p=>p.id===pressId);
  if(!job||!press) return;
  job.press=pressId; job.status='setup';
  press.job=jobId; press.status='setup'; press.product=job.product;
  press.customer=job.customer; press.pct=5; press.eta='Setting up mould '+job.mould;
  press.emergency=job.priority==='emergency'; press.mould=job.mould;
  closeModal();
  showToast(`✓ ${jobId} assigned to ${press.name}`,'ok');
  spt('mould');
}

function doFlagEmergency(){
  const jobId=document.getElementById('em-job')?.value;
  const reason=document.getElementById('em-reason')?.value;
  if(!jobId){showToast('Select a job','warn');return;}
  if(!reason){showToast('Reason is mandatory for Emergency PO','warn');return;}
  const job=JOBS.find(j=>j.id===jobId);
  if(job){ job.priority='emergency'; job.notes=reason; STATE.emergencyActive=true; }
  closeModal();
  showToast(`🔴 ${jobId} flagged as Emergency — Ambulance Corridor activated`,'ok');
  updateSidebarCount();
  spt(STATE.activeTab);
}

let orderFilter = 'all';

/* ---- TAT ENGINE ---- */
function calcMouldRate(prod){
  // pieces per hour from press = (60 / cureTime_min) × cavities
  return (60 / prod.cureTime) * prod.cavities;
}

function calcJobRemainingTAT(job, hc){
  // hc = { finishers, inspectors }; returns total remaining hrs
  const prod = PRODUCTS.find(p=>p.name===job.product || p.code===job.product || p.id===job.prodId);
  if(!prod) return 8; // fallback
  const finishers  = hc?.finishers  || STATE.plannedFinishers;
  const inspectors = hc?.inspectors || STATE.plannedInspectors;
  const stages = ['moulding','finishing','inspection','pdi'];
  const curIdx  = stages.indexOf(job.stage);
  const qtyRem  = job.qty - (job.qtyDone||0);
  let hrs = 0;
  stages.forEach((s,i)=>{
    if(i < curIdx) return;
    const q = (i === curIdx) ? qtyRem : job.qty;
    if(s==='moulding')   hrs += (q / calcMouldRate(prod)) + (prod.setupTime||0.5);
    if(s==='finishing')  hrs += q / Math.max(1, (prod.finishRate||10) * finishers);
    if(s==='inspection') hrs += q / Math.max(1, (prod.inspRate||20)   * inspectors);
    if(s==='pdi')        hrs += (prod.pdiTime||0.25);
  });
  return hrs;
}

function getOTDImpact(){
  const hc = { finishers: STATE.finishers, inspectors: STATE.inspectors };
  return JOBS
    .filter(j=>['moulding','finishing','inspection','pdi'].includes(j.stage))
    .map(j=>{
      const prod    = PRODUCTS.find(p=>p.name===j.product||p.code===j.product);
      const remHrs  = calcJobRemainingTAT(j, hc);
      const projEnd = new Date(STATE.now.getTime() + remHrs*3600000);
      const promised= new Date(j.promised+'T17:00:00');
      const bufferHrs = (promised - projEnd) / 3600000;
      let risk = 'safe';
      if(bufferHrs < 0) risk = bufferHrs < -8 ? 'breach' : 'atrisk';
      // Overtime option: extra hours beyond shift with same headcount
      const otHrs = risk!=='safe' ? Math.ceil(Math.abs(bufferHrs)*10)/10 : 0;
      // Extra-worker option: how many more finishers needed to finish within remaining shift
      let extraWorkers = 0;
      if(risk!=='safe' && prod && j.stage==='finishing'){
        const shiftLeft = STATE.shiftHoursLeft;
        const qtyRem = j.qty-(j.qtyDone||0);
        const workersNeeded = Math.ceil(qtyRem / ((prod.finishRate||10)*shiftLeft));
        extraWorkers = Math.max(0, workersNeeded - STATE.finishers);
      }
      return { job:j, prod, remHrs, projEnd, promised, bufferHrs, risk, otHrs, extraWorkers };
    })
    .sort((a,b)=>({breach:0,atrisk:1,safe:2}[a.risk]||0)-({breach:0,atrisk:1,safe:2}[b.risk]||0));
}

function calcLSD(prodId, promisedDateStr){
  const prod = PRODUCTS.find(p=>p.id===prodId);
  if(!prod || !promisedDateStr) return null;
  // Use default planned headcount for LSD estimate at PO entry
  const hc = { finishers: STATE.plannedFinishers, inspectors: STATE.plannedInspectors };
  // Estimate TAT in days using rates with a placeholder qty (100 pcs)
  const refQty = 100;
  const mouldHrs = (refQty / calcMouldRate(prod)) + (prod.setupTime||0.5);
  const finHrs   = refQty / Math.max(1, (prod.finishRate||10) * hc.finishers);
  const inspHrs  = refQty / Math.max(1, (prod.inspRate||20)  * hc.inspectors);
  const pdiHrs   = prod.pdiTime||0.25;
  const totalDays = Math.ceil((mouldHrs + finHrs + inspHrs + pdiHrs) / 8); // 8hr shift
  const d = new Date(promisedDateStr+'T00:00:00');
  d.setDate(d.getDate() - totalDays);
  return d.toISOString().slice(0,10);
}

    dispatch: ORDERS.filter(o=>o.status==='dispatch').length,
    dispatched: ORDERS.filter(o=>o.status==='dispatched').length,
  };

  const filtered = orderFilter==='all' ? ORDERS : ORDERS.filter(o=>o.status===orderFilter);
  filtered.sort((a,b)=>{
    if(a.priority==='emergency') return -1;
    if(b.priority==='emergency') return 1;
    return new Date(a.lsd)-new Date(b.lsd);
  });

  const statusLabels={new:'New',dispatched:'Dispatched','in-production':'In Production',pdi:'PDI',dispatch:'Ready to Dispatch'};

  const rows = filtered.map(o=>{
    const cust = CUSTOMERS.find(c=>c.id===o.custId);

      <td><span style="font-size:10px;color:#6A6D70">₹${totalVal.toLocaleString('en-IN',{maximumFractionDigits:0})}</span></td>

      <div class="tbl-wrap"><table>

function npoLineChanged(n){
  const prodId = document.getElementById('npo-prod-'+n)?.value;
  const qty    = parseInt(document.getElementById('npo-qty-'+n)?.value||0);
  const priceEl= document.getElementById('npo-price-'+n);
  const totalEl= document.getElementById('npo-total-'+n);
  const lsdEl  = document.getElementById('npo-lsd-'+n);
  const dateVal= document.getElementById('npo-date')?.value;

  if(prodId){
    const prod = PRODUCTS.find(p=>p.id===prodId);
    if(prod && priceEl && !priceEl.value) priceEl.value = prod.unitCost.toFixed(2);
  }
  const price = parseFloat(priceEl?.value||0);
  if(totalEl) totalEl.textContent = qty&&price ? '₹'+( qty*price).toLocaleString('en-IN',{maximumFractionDigits:0}) : '—';

  if(lsdEl){
    if(prodId && dateVal){
      const lsd = calcLSD(prodId, dateVal);
      const cls = lsdClass(lsd);
      lsdEl.innerHTML = `<span class="${cls}">${fmtDate(lsd)}</span>`;
    } else { lsdEl.textContent='—'; }
  }
  npoUpdateGrandTotal();
}

function npoRefreshLines(){
  const count = window._npoLineCount||1;
  for(let i=1;i<=count;i++) npoLineChanged(i);

function npoUpdateGrandTotal(){
  const count = window._npoLineCount||1;
  let total=0;
  for(let i=1;i<=count;i++){
    const qty   = parseInt(document.getElementById('npo-qty-'+i)?.value||0);
    const price = parseFloat(document.getElementById('npo-price-'+i)?.value||0);
    total += qty*price;
  }
  const el=document.getElementById('npo-grand-total');
  if(el) el.textContent = '₹'+total.toLocaleString('en-IN',{maximumFractionDigits:0});
}

function submitNewPO(){
  const custId   = document.getElementById('npo-cust')?.value;
  const dateVal  = document.getElementById('npo-date')?.value;
  const priority = document.getElementById('npo-priority')?.value||'normal';
  const emReason = document.getElementById('npo-em-reason')?.value||'';
  const notes    = document.getElementById('npo-notes')?.value||'';
  const count    = window._npoLineCount||1;

  if(!custId||!dateVal){ showToast('Please fill customer and delivery date','warn'); return; }
  if(priority==='emergency'&&!emReason){ showToast('Emergency reason is mandatory','warn'); return; }

  // Collect lines
  const lines=[];
  for(let i=1;i<=count;i++){
    const tr=document.getElementById('npo-line-'+i); if(!tr) continue;
    const prodId = document.getElementById('npo-prod-'+i)?.value;
    const qty    = parseInt(document.getElementById('npo-qty-'+i)?.value||0);
    const price  = parseFloat(document.getElementById('npo-price-'+i)?.value||0);
    if(!prodId||!qty){ showToast(`Line ${i}: product and quantity required`,'warn'); return; }
    const lsd = calcLSD(prodId, dateVal);
    const newJobId = 'MRT-'+(Math.max(...JOBS.map(j=>parseInt(j.id.split('-')[1])))+lines.length+1);
    lines.push({ lineNo:i, prodId, qty, uom:'pcs', unitCost:price, lsd, jobId:newJobId });
  }
  if(!lines.length){ showToast('Add at least one line item','warn'); return; }

  const newId = 'PO-'+(Math.max(...ORDERS.map(o=>parseInt(o.id.split('-')[1])))+1);
  const newOrder = { id:newId, custId, promised:dateVal, lines, status:'new',
    priority, createdOn:'2026-05-13', createdBy:'AK',
    notes:priority==='emergency'?emReason:notes, changeLog:[] };
  ORDERS.unshift(newOrder);

  // Create one Production Job per line
  lines.forEach(l=>{
    const prod = PRODUCTS.find(p=>p.id===l.prodId);
    const cust = CUSTOMERS.find(c=>c.id===custId);
    JOBS.push({ id:l.jobId, stage:'moulding', product:prod?.name||l.prodId,
      customer:cust?.name||custId, qty:l.qty, promised:dateVal, lsd:l.lsd,
      batch:'—', batchName:'—', mould:prod?.mould||'—', cavities:prod?.cavities||1,
      cureTime:(prod?.cureTime||0)+' min', cureTemp:(prod?.cureTemp||0)+'°C',
      press:null, status:'queued', priority, notes:notes||emReason });
  });

  if(priority==='emergency') STATE.emergencyActive=true;
  closeModal();
  showToast(`✓ ${newId} created (${lines.length} line${lines.length>1?'s':''}) → ${lines.length} job${lines.length>1?'s':''} added to Moulding queue`,'ok');
  updateAllCounts();
  renderOrders();
}

function submitChangeDate(orderId){
  const o = ORDERS.find(x=>x.id===orderId);
  if(!o) return;
  const newDate = document.getElementById('chg-date')?.value;
  const reason  = document.getElementById('chg-reason')?.value;
  const auth    = document.getElementById('chg-auth')?.value||'—';
  if(!newDate){ showToast('Please select a new date','warn'); return; }
  if(!reason){ showToast('Reason is mandatory','warn'); return; }
  const oldDate = o.promised;
  o.changeLog = o.changeLog||[];
  o.changeLog.push({ ts:'13 May 2026 · '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
    msg:`Promised date changed from <strong>${fmtDate(oldDate)}</strong> to <strong>${fmtDate(newDate)}</strong> — ${reason} · Authorised by: ${auth}` });
  o.promised = newDate;
  // Recalculate LSD for every line
  o.lines.forEach(l=>{ l.lsd = calcLSD(l.prodId, newDate)||l.lsd; });
  closeModal();
  showToast(`✓ ${orderId} promised date updated to ${fmtDate(newDate)}`,'ok');
  openOrderDetail(orderId);
}

// Helpers for header+lines model
function ohStatus(oh){
  const ls = oh.lines.map(l=>l.status);
  if(ls.every(s=>s==='dispatched')) return 'dispatched';
  if(ls.some(s=>s==='dispatch'))    return 'dispatch';
  if(ls.some(s=>s==='pdi'))         return 'pdi';
  if(ls.some(s=>s==='in-production')) return 'in-production';
  if(ls.every(s=>s==='new'))        return 'new';
  return oh.status||'new';
}

function ohLSD(oh){
  // Earliest LSD across lines
  const lsds = oh.lines.map(l=>l.lsd).filter(Boolean).sort();
  return lsds[0]||null;
}

function ohPromised(oh){
  const dates = oh.lines.map(l=>l.promised).filter(Boolean).sort();
  return dates[0]||null;
}

function ohTotal(oh){
  return oh.lines.reduce((s,l)=>s+(l.qty*(l.unitPrice||0)),0);
}

function currSymbol(cur){ return cur==='GBP'?'£':cur==='USD'?'$':'₹'; }

let orderFilter2 = 'all';
let otdFilter    = 'all';   // all | on-time | late

function renderOrders(){
  const fc = {
    all:           ORDER_HEADERS.length,
    new:           ORDER_HEADERS.filter(o=>ohStatus(o)==='new').length,
    'in-production': ORDER_HEADERS.filter(o=>ohStatus(o)==='in-production').length,
    pdi:           ORDER_HEADERS.filter(o=>ohStatus(o)==='pdi').length,
    dispatch:      ORDER_HEADERS.filter(o=>ohStatus(o)==='dispatch').length,
    dispatched:    ORDER_HEADERS.filter(o=>ohStatus(o)==='dispatched').length,
  };

  // OTD counts respect the active status tab so the two filters compose.
  const statusScoped = orderFilter2==='all'
    ? ORDER_HEADERS
    : ORDER_HEADERS.filter(o=>ohStatus(o)===orderFilter2);
  const oc = {
    all:       statusScoped.length,
    'on-time': statusScoped.filter(o=>o.otdResult==='on-time').length,
    late:      statusScoped.filter(o=>o.otdResult==='late').length,
  };

  // Group rows by workflow stage (New → In Production → PDI → Dispatch →
  // Dispatched); within a stage keep emergency-first, then earliest LSD.
  const STATUS_ORDER = { 'new':0, 'in-production':1, 'pdi':2, 'dispatch':3, 'dispatched':4 };
  const filtered = statusScoped
    .filter(o=> otdFilter==='all' ? true : o.otdResult===otdFilter)
    .sort((a,b)=>{
      const sa = STATUS_ORDER[ohStatus(a)] ?? 99, sb = STATUS_ORDER[ohStatus(b)] ?? 99;
      if(sa!==sb) return sa-sb;
      if(a.priority==='emergency' && b.priority!=='emergency') return -1;
      if(b.priority==='emergency' && a.priority!=='emergency') return 1;
      return new Date(ohLSD(a)||0) - new Date(ohLSD(b)||0);
    });

  const rows = filtered.map(oh=>{
    const cust = CUSTOMERS.find(c=>c.id===oh.custId);
    const st   = ohStatus(oh);
    const lsd  = ohLSD(oh);
    const prom = ohPromised(oh);
    const tot  = ohTotal(oh);
    const sym  = currSymbol(oh.currency);
    const emB  = oh.priority==='emergency' ? '<span class="b bem">🔴 EM</span> ':'';
    const lineCount = oh.lines.length;
    const otdB = oh.otdResult
      ? `<span class="b ${oh.otdResult==='on-time'?'bok':'ber'}">${oh.otdResult==='on-time'?'On Time':'Late'}</span>`
      : '—';

    return `<tr class="jr" onclick="openOrderDetail2('${oh.id}')">

        ${i===0?'<label class="form-lbl">LSD (auto)</label>':''}
        <input class="form-inp" style="font-size:11px;background:#FAFAFA;color:#E9730C;font-weight:600" readonly value="${l.lsd?fmtDate(l.lsd):'—'}" id="npo-lsd-${i}">

function npoLineProductChange(i, prodId){
  const prod = PRODUCTS.find(p=>p.id===prodId);
  if(!prod) return;
  poLines[i].prodId    = prodId;
  poLines[i].unitPrice = prod.unitCost||0;
  const promised = poLines[i].promised || '2026-05-25';
  poLines[i].lsd = calcLSD(prodId, promised);
  // Re-render to show auto-filled price
  npoRenderLines();
}

function npoLineUpdate(i, field, val){
  poLines[i][field] = field==='qty'||field==='unitPrice' ? parseFloat(val)||0 : val;
  if((field==='promised'||field==='prodId') && poLines[i].prodId && poLines[i].promised){
    poLines[i].lsd = calcLSD(poLines[i].prodId, poLines[i].promised);
    const lsdEl = document.getElementById('npo-lsd-'+i);
    if(lsdEl) lsdEl.value = poLines[i].lsd ? fmtDate(poLines[i].lsd) : '—';
  }
  npoUpdateFooter();
}

function npoAddLine(){
  poLines.push({ no:poLines.length+1, prodId:'', qty:1, uom:'Pcs', unitPrice:0, promised:'2026-05-25', lsd:'' });
  npoRenderLines();
}

function npoRemoveLine(i){
  if(poLines.length<=1) return;
  poLines.splice(i,1);
  poLines.forEach((l,j)=>l.no=j+1);
  npoRenderLines();
}

function npoUpdateFooter(){
  const total = poLines.reduce((s,l)=>s+(l.qty*(l.unitPrice||0)),0);
  const totalQty = poLines.reduce((s,l)=>s+(l.qty||0),0);
  const curr = document.getElementById('npo-currency')?.value||'INR';
  const sym = currSymbol(curr);
  const lc = document.getElementById('npo-line-count'); if(lc) lc.textContent=poLines.length;
  const tq = document.getElementById('npo-total-qty');  if(tq) tq.textContent=totalQty.toLocaleString();
  const tv = document.getElementById('npo-total-val');  if(tv) tv.textContent=sym+total.toLocaleString('en-IN',{minimumFractionDigits:2});
}

function submitNewPO(){
  const custId   = document.getElementById('npo-cust')?.value;
  const docDate  = document.getElementById('npo-docdate')?.value;
  const currency = document.getElementById('npo-currency')?.value||'INR';
  const payTerms = document.getElementById('npo-terms')?.value||'30d net';
  const priority = document.getElementById('npo-priority')?.value||'normal';
  const emReason = document.getElementById('npo-em-reason')?.value||'';
  const notes    = document.getElementById('npo-notes')?.value||'';

  if(!custId){ showToast('Please select a customer','warn'); return; }
  if(priority==='emergency'&&!emReason){ showToast('Emergency reason is mandatory','warn'); return; }

  const validLines = poLines.filter(l=>l.prodId&&l.qty>0&&l.promised);
  if(!validLines.length){ showToast('Add at least one complete order line','warn'); return; }

  const newId = 'PO-'+(Math.max(...ORDER_HEADERS.map(o=>parseInt(o.id.split('-')[1])))+1);
  const lsdFinal = validLines.map(l=>l.lsd).filter(Boolean).sort()[0]||null;

  const newOH = {
    id:         newId,
    custId,
    docDate:    docDate||'2026-05-13',
    currency,
    payTerms,
    priority,
    notes:      priority==='emergency' ? emReason : notes,
    createdBy:  'AK',
    changeLog:  [],
    status:     'new',
    otdResult:  null,
    dispatchedOn: null,
    lines: validLines.map((l,i)=>{
      const prod = PRODUCTS.find(p=>p.id===l.prodId);
      const newJobId = 'MRT-'+(Math.max(...JOBS.map(j=>parseInt(j.id.split('-')[1])))+i+1);
      // Create job in moulding queue
      JOBS.push({
        id:newJobId, stage:'moulding', product:prod?.name||'—',
        customer: CUSTOMERS.find(c=>c.id===custId)?.name||'—',
        qty:l.qty, promised:l.promised, lsd:l.lsd,
        batch:'—', batchName:'—', mould:prod?.mould||'—',
        cavities:prod?.cavities||0, cureTime:(prod?.cureTime||0)+' min',
        cureTemp:(prod?.cureTemp||0)+'°C', press:null,
        status:'queued', priority, notes:notes||emReason
      });
      return { no:i+1, prodId:l.prodId, desc:prod?.name||'—',
               qty:l.qty, uom:l.uom||'Pcs', unitPrice:l.unitPrice||0,
               promised:l.promised, lsd:l.lsd, status:'new', jobId:newJobId };
    })
  };

  ORDER_HEADERS.unshift(newOH);
  if(priority==='emergency') STATE.emergencyActive=true;
  closeModal();
  showToast(`✓ ${newId} created — ${validLines.length} line(s), ${validLines.length} job(s) added to Moulding queue`,'ok');
  updateAllCounts();
  renderOrders();
}

<script>
/* ============================================================
   PHASE 2.5 — STAGE MILESTONE SYSTEM
   
   WHY THIS IS A SEPARATE SCRIPT BLOCK (not appended to the one above):
   The main script calls nav('dashboard') at line ~1207, before
   const PRODUCTS (line ~1233) and const ORDER_HEADERS (~line 2306)
   are initialised.  Any function declaration in that block that
   references those consts will throw a TDZ ReferenceError — even
   typeof checks do NOT protect against TDZ for const/let.

   Solution:
   • Helper functions (calcMilestones, stageRAG, ragCell, getMS,
     curStagePlan) are plain function declarations here — safe
     because they guard PRODUCTS access with try/catch.
   • New render functions (_ms_render*) are var ASSIGNMENTS, not
     declarations, so they are never hoisted and never run until
     this block executes — by which time all data is fully defined.
   • We then patch VIEWS.dashboard and spt() to point to our new
     functions, and call nav('dashboard') to re-render.
   ============================================================ */

// ── Core helpers ───────────────────────────────────────────────

function calcMilestones(promisedDateStr, prod) {
  var BUF = 3; // dispatch buffer days
  if (!promisedDateStr || !prod) return null;
  function sub(ds, n) {
    var d = new Date(ds + 'T00:00:00');
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  }
  // Rate-based TAT in days (using 200pcs reference qty and planned headcount)
  var refQty = 200;
  var mR = (60 / (prod.cureTime||18)) * (prod.cavities||2);
  var mDays   = Math.ceil(((refQty/mR)+(prod.setupTime||0.5))/8);
  var fDays   = Math.ceil((refQty/((prod.finishRate||10)*STATE.plannedFinishers))/8);
  var iDays   = Math.ceil((refQty/((prod.inspRate||20)*STATE.plannedInspectors))/8);
  var pdiDays = Math.max(1, Math.ceil((prod.pdiTime||0.25)));

  var pmReadyDate   = sub(promisedDateStr, BUF);
  var pmPDIEnd      = pmReadyDate;
  var pmPDIStart    = sub(pmPDIEnd,    pdiDays);
  var pmInspEnd     = pmPDIStart;
  var pmInspStart   = sub(pmInspEnd,   iDays);
  var pmFinishEnd   = pmInspStart;
  var pmFinishStart = sub(pmFinishEnd, fDays);
  var pmMouldEnd    = pmFinishStart;
  var pmMouldStart  = sub(pmMouldEnd,  mDays); // = LSD
  return {
    pmReadyDate: pmReadyDate, pmPDIEnd: pmPDIEnd, pmPDIStart: pmPDIStart,
    pmInspEnd: pmInspEnd,     pmInspStart: pmInspStart,
    pmFinishEnd: pmFinishEnd, pmFinishStart: pmFinishStart,
    pmMouldEnd: pmMouldEnd,   pmMouldStart: pmMouldStart
  };
}

function stageRAG(planDateStr) {
  var today = new Date('2026-05-13T00:00:00');
  if (!planDateStr) return { dot: '#C0C0C0', cls: '', label: '—' };
  var diff = Math.floor((new Date(planDateStr + 'T00:00:00') - today) / 86400000);
  if (diff <  0) return { dot: '#BB0000', cls: 'llt', label: 'Missed ' + Math.abs(diff) + 'd ago' };
  if (diff === 0) return { dot: '#E9730C', cls: 'lwn', label: 'Due today'    };
  if (diff === 1) return { dot: '#E9730C', cls: 'lwn', label: 'Due tomorrow' };
  return              { dot: '#107E3E', cls: 'lok', label: '+' + diff + 'd' };
}

function ragCell(planDateStr) {
  if (!planDateStr) return '—';
  var r = stageRAG(planDateStr);
  return '<span style="display:inline-flex;align-items:center;gap:5px">' +
    '<span style="width:8px;height:8px;border-radius:50%;background:' + r.dot +
          ';flex-shrink:0;display:inline-block"></span>' +
    '<span class="' + r.cls + '" style="font-size:11.5px">' + fmtDate(planDateStr) + '</span>' +
    '<span style="font-size:9.5px;color:#9E9E9E">' + r.label + '</span>' +
    '</span>';
}

// getMS uses try/catch so it is safe if called before PRODUCTS exists
function getMS(job) {
  if (!window._msc) window._msc = {};
  if (window._msc.hasOwnProperty(job.id)) return window._msc[job.id];
  var result = null;
  try {
    var prods = PRODUCTS; // throws if TDZ — caught below
    if (Array.isArray(prods)) {
      var prodId = null;
      try {
        var ohs = ORDER_HEADERS;
        if (Array.isArray(ohs)) {
          var done = false;
          for (var oi = 0; oi < ohs.length && !done; oi++) {
            for (var li = 0; li < ohs[oi].lines.length && !done; li++) {
              if (ohs[oi].lines[li].jobId === job.id) {
                prodId = ohs[oi].lines[li].prodId; done = true;
              }
            }
          }
        }
      } catch(e2) {}
      if (!prodId) {
        var mp = prods.find(function(p) { return p.name === job.product; });
        if (mp) prodId = mp.id;
      }
      var prod = prods.find(function(p) { return p.id === prodId; });
      result = prod ? calcMilestones(job.promised, prod) : null;
    }
  } catch(e) { result = null; }
  window._msc[job.id] = result;
  return result;
}

function curStagePlan(job) {
  var ms = getMS(job);
  if (!ms) return null;
  var m = { moulding: ms.pmMouldStart, finishing: ms.pmFinishStart,
            inspection: ms.pmInspStart, pdi: ms.pmPDIStart };
  return m[job.stage] || null;
}

function _showMSPreview(n) {
  var dateVal = (document.getElementById('npo-date') || {}).value;
  var prodEl  = document.getElementById('npo-prod-' + n);
  var prod = null;
  try {
    if (prodEl && Array.isArray(PRODUCTS))
      prod = PRODUCTS.find(function(p) { return p.id === prodEl.value; });
  } catch(e) {}
  var preId = 'npo-ms-' + n, existing = document.getElementById(preId);
  if (!prod || !dateVal) { if (existing) existing.remove(); return; }
  var ms2 = calcMilestones(dateVal, prod);
  if (!ms2) return;
  var html = '<td colspan="7" style="padding:4px 8px 7px;background:#F0F6FF;font-size:10.5px;color:#6A6D70">' +
    '<span style="font-weight:600;color:#354A5E;margin-right:8px;font-size:10px">MILESTONES:</span>' +
    '<span style="margin-right:10px">🔵 Mould <strong style="color:#32363A">' + fmtDate(ms2.pmMouldStart) + '</strong></span>' +
    '<span style="margin-right:10px">🟡 Finish <strong style="color:#32363A">' + fmtDate(ms2.pmFinishStart) + '</strong></span>' +
    '<span style="margin-right:10px">🟣 Inspect <strong style="color:#32363A">' + fmtDate(ms2.pmInspStart) + '</strong></span>' +
    '<span style="margin-right:10px">🟤 PDI <strong style="color:#32363A">' + fmtDate(ms2.pmPDIStart) + '</strong></span>' +
    '<span>📦 Ready by <strong style="color:#E9730C">' + fmtDate(ms2.pmReadyDate) +
    '</strong> <span style="color:#9E9E9E">(3d before delivery)</span></span></td>';
  if (existing) { existing.innerHTML = html; }
  else {
    var lineRow = document.getElementById('npo-line-' + n);
    if (lineRow) {
      var pr = document.createElement('tr'); pr.id = preId;
      pr.innerHTML = html; lineRow.after(pr);
    }
  }
}

// ── New render functions (var assignments — NOT hoisted) ───────
// These execute only when this script block runs, AFTER all data is defined.

var _ms_renderDashboard = function() {
  var today13 = new Date('2026-05-13T00:00:00');
  var wipCount  = JOBS.filter(function(j) { return j.stage !== 'dispatch'; }).length;
  var overdue   = JOBS.filter(function(j) { return new Date(j.promised + 'T00:00:00') < today13 && j.stage !== 'dispatch'; }).length;
  var pressUtil = Math.round(PRESSES.filter(function(p) { return p.status === 'running'; }).length / 4 * 100);
  var emJobs    = JOBS.filter(function(j) { return j.priority === 'emergency'; });

  var emBanner = '';
  if (STATE.emergencyActive && emJobs.length) {
    emBanner = '<div class="abar er"><i class="ti ti-alert-triangle"></i>' +
      '<div class="abar-body"><strong>🔴 EMERGENCY PO ACTIVE:</strong> ' +
      emJobs.map(function(j) {
        return '<strong>' + j.id + '</strong> — ' + j.product + ' · ' + j.customer +
               ' · Promised <strong>' + fmtDate(j.promised) + '</strong>';
      }).join(' &nbsp;|&nbsp; ') +
      ' &nbsp;· Ambulance corridor active — absolute priority across all stages.</div>' +
      '<button class="abar-act" onclick="nav(\'prod\',\'Production Sequencer\');' +
      'setTimeout(function(){spt(\'mould\')},50)">View in Production →</button></div>';
  }

  var kpi = '<div class="kr">' +
    '<div class="kpi bl"><div class="kv">87%</div><div class="kl">On-Time Delivery (MTD)</div>' +
    '<div class="kd n"><i class="ti ti-arrow-down-right" style="font-size:10px"></i> −3% vs last month</div></div>' +
    '<div class="kpi or"><div class="kv">' + wipCount + '</div><div class="kl">WIP Jobs in Pipeline</div>' +
    '<div class="kd w"><i class="ti ti-clock" style="font-size:10px"></i> ' + emJobs.length + ' emergency</div></div>' +
    '<div class="kpi rd"><div class="kv">' + overdue + '</div><div class="kl">Overdue / At Risk Jobs</div>' +
    '<div class="kd n"><i class="ti ti-alert-circle" style="font-size:10px"></i> Needs immediate action</div></div>' +
    '<div class="kpi gr"><div class="kv">' + pressUtil + '%</div><div class="kl">Press Utilisation (Now)</div>' +
    '<div class="kd p"><i class="ti ti-check" style="font-size:10px"></i> 2 of 4 presses running</div></div>' +
    '</div>';

  var pb = '<div class="tc"><div class="tc-hd"><i class="ti ti-tool" style="color:#6A6D70;font-size:14px"></i>' +
    '<span class="tc-tt">Live Press Board</span><span class="tc-ct">as of 10:30 · 13 May 2026</span>' +
    '<button class="bp sm" onclick="nav(\'prod\',\'Production Sequencer\');setTimeout(function(){spt(\'mould\')},50)">' +

  inspection: [

    { id:'I02', name:'Mohan D.',    role:'Inspector',        present:true  },
    { id:'I03', name:'Vijay S.',    role:'Inspector',        present:false },
    { id:'I04', name:'Anil C.',     role:'Inspector',        present:true  },
  ]
};

// Sync STATE.finishers / inspectors from WORKERS on load
STATE.finishers  = WORKERS.finishing.filter(w=>w.present).length;
STATE.inspectors = WORKERS.inspection.filter(w=>w.present).length;

function toggleWorker(dept, id){
  var w = WORKERS[dept].find(function(x){ return x.id===id; });
  if(!w) return;
  w.present = !w.present;
  STATE.finishers  = WORKERS.finishing.filter(function(x){ return x.present; }).length;
  STATE.inspectors = WORKERS.inspection.filter(function(x){ return x.present; }).length;
  spt('shift'); // re-render shift briefing with updated counts
}

// Stage tabs: replace spt so tab renders use new functions
var _origSpt = spt;
spt = function(k) {
  STATE.activeTab = k;
  document.querySelectorAll('.st').forEach(function(t) {
    t.classList.toggle('a', !!(t.getAttribute('onclick') && t.getAttribute('onclick').includes("'" + k + "'")));
  });
  var rfn = {
    shift:    renderShiftBriefing,   // ← shift briefing
    mould:    _ms_renderMoulding,
    finish:   _ms_renderFinishing,
    insp:     _ms_renderInspection,
    pdi:      _ms_renderPDI,
    dispatch: renderDispatch
  };
  var ptb = document.getElementById('ptb');
  if (ptb && rfn[k]) ptb.innerHTML = rfn[k]();
  else if (ptb && !rfn[k]) ptb.innerHTML = ''; // unknown tab — clear
};

// New PO modal: add milestone preview row
var _origNLC = npoLineChanged;
npoLineChanged = function(n) { _origNLC(n); _showMSPreview(n); };

var _origNRL = npoRefreshLines;
npoRefreshLines = function() {
  _origNRL();
  var tb = document.getElementById('npo-lines-body');
  if (!tb) return;
  tb.querySelectorAll('tr[id^="npo-line-"]').forEach(function(row) {
    _showMSPreview(parseInt(row.id.replace('npo-line-', '')));
  });
};

/* ============================================================
   SHIFT BRIEFING MODULE
   ============================================================ */

function renderShiftBriefing(){
  const impact = getOTDImpact();
  const safe   = impact.filter(x=>x.risk==='safe').length;
  const atRisk = impact.filter(x=>x.risk==='atrisk').length;
  const breach = impact.filter(x=>x.risk==='breach').length;

  function rosterHTML(dept, label, color){
    const workers = WORKERS[dept];
    const present = workers.filter(w=>w.present).length;
    const absent  = workers.length - present;
    return `<div style="flex:1;min-width:260px;">
      <div style="font-size:11px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">
        ${label} &nbsp;<span style="font-weight:400;color:#6A6D70">${present} present &middot; ${absent} absent of ${workers.length}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;">
        ${workers.map(w=>`
          <div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:3px;background:${w.present?'#F1F8E9':'#FFF5F5'};border:1px solid ${w.present?'#C5E1A5':'#FFCDD2'};">
            <div style="width:8px;height:8px;border-radius:50%;background:${w.present?'#107E3E':'#BB0000'};flex-shrink:0"></div>
            <span style="flex:1;font-size:12px;color:#32363A;font-weight:${w.present?'500':'400'}">${w.name}</span>
            <span style="font-size:10px;color:#6A6D70;min-width:110px">${w.role}</span>
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0">
              <input type="checkbox" ${w.present?'checked':''} onchange="toggleWorker('${dept}','${w.id}')"
                style="width:14px;height:14px;cursor:pointer;accent-color:#107E3E">
              <span style="font-size:10px;color:${w.present?'#107E3E':'#BB0000'};min-width:42px">${w.present?'Present':'Absent'}</span>
            </label>
          </div>`).join('')}
      </div>
    </div>`;
  }

  const attendancePanel = `<div class="tc" style="margin-bottom:10px;">
    <div class="tc-hd">
      <i class="ti ti-users" style="color:#6A6D70;font-size:14px"></i>
      <span class="tc-tt">Attendance Register &mdash; 13 May 2026 &middot; Day Shift</span>
      <span class="tc-ct">Tick/untick each worker &rarr; OTD projections update instantly</span>
    </div>
    <div style="padding:12px;display:flex;gap:16px;flex-wrap:wrap;">
      ${rosterHTML('finishing','&#9986; Finishing','#0A6ED1')}
      ${rosterHTML('inspection','&#128269; Inspection','#E9730C')}
    </div>
    <div style="padding:8px 12px 12px;display:flex;gap:10px;flex-wrap:wrap;border-top:1px solid #F3F3F3;">
      <div style="background:#E8F0FD;border-radius:3px;padding:6px 14px;font-size:12px;">
        <strong style="color:#0A6ED1">${STATE.finishers}</strong> <span style="color:#6A6D70">finishers on floor</span>
      </div>
      <div style="background:#FFF8EC;border-radius:3px;padding:6px 14px;font-size:12px;">
        <strong style="color:#E9730C">${STATE.inspectors}</strong> <span style="color:#6A6D70">inspectors on floor</span>
      </div>
      <div style="background:#F7F7F7;border-radius:3px;padding:6px 14px;font-size:12px;display:flex;align-items:center;gap:6px;">
        <span style="color:#6A6D70">Shift hrs left:</span>
        <input type="number" value="${STATE.shiftHoursLeft}" min="0.5" max="12" step="0.5"
          style="width:45px;padding:2px 5px;border:1px solid #E4E5E6;border-radius:3px;font-size:12px;"
          oninput="STATE.shiftHoursLeft=parseFloat(this.value)||8;spt('shift')">
        <strong>hrs</strong>
      </div>
      <div style="background:#F7F7F7;border-radius:3px;padding:6px 14px;font-size:12px;display:flex;align-items:center;gap:6px;">
        <span style="color:#6A6D70">OT authorised:</span>
        <input type="number" value="${STATE.overtimeMax}" min="0" max="4" step="0.5"
          style="width:40px;padding:2px 5px;border:1px solid #E4E5E6;border-radius:3px;font-size:12px;"
          oninput="STATE.overtimeMax=parseFloat(this.value)||0;spt('shift')">
        <strong>hrs</strong>
      </div>
    </div>
  </div>`;

  const summaryCards = `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;">
    <div class="kpi bl"><div class="kv">${STATE.finishers}</div><div class="kl">Finishers Present</div><div class="kd ${STATE.finishers<STATE.plannedFinishers?'n':'p'}">${STATE.finishers<STATE.plannedFinishers?'&#9888; '+(STATE.plannedFinishers-STATE.finishers)+' absent':'&#10003; Full strength'}</div></div>
    <div class="kpi or"><div class="kv">${STATE.inspectors}</div><div class="kl">Inspectors Present</div><div class="kd ${STATE.inspectors<STATE.plannedInspectors?'n':'p'}">${STATE.inspectors<STATE.plannedInspectors?'&#9888; '+(STATE.plannedInspectors-STATE.inspectors)+' absent':'&#10003; Full strength'}</div></div>
    <div class="kpi gr"><div class="kv">${safe}</div><div class="kl">Jobs &mdash; On Track</div><div class="kd p">Will meet promised date</div></div>
    <div class="kpi rd"><div class="kv">${atRisk+breach}</div><div class="kl">At Risk / Breach</div><div class="kd n">${breach} breach &middot; ${atRisk} at risk</div></div>
  </div>`;

  const impactRows = impact.map(x=>{
    const riskLabel = x.risk==='breach'
      ? `<span class="b ber">&#128308; OTD Breach</span>`
      : x.risk==='atrisk'
      ? `<span class="b bwn">&#9888; At Risk</span>`
      : `<span class="b bok">&#10003; Safe</span>`;
    const projStr = x.projEnd.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})+', '+x.projEnd.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
    const bufStr  = x.bufferHrs>=0
      ? `<span style="color:#107E3E">+${x.bufferHrs.toFixed(1)}h buffer</span>`
      : `<span style="color:#BB0000">${x.bufferHrs.toFixed(1)}h overrun</span>`;
    const otNote = x.risk!=='safe'
      ? (x.otHrs>0 && x.otHrs<=STATE.overtimeMax
          ? `<div style="font-size:10px;color:#107E3E;margin-top:2px">&#10003; +${x.otHrs}h OT recovers (within budget)</div>`
          : x.otHrs>STATE.overtimeMax
          ? `<div style="font-size:10px;color:#BB0000;margin-top:2px">&#10007; Needs +${x.otHrs}h OT &mdash; exceeds ${STATE.overtimeMax}h budget. Escalate.</div>`
          : x.extraWorkers>0
          ? `<div style="font-size:10px;color:#E9730C;margin-top:2px">Alt: +${x.extraWorkers} finishers within shift</div>`
          : '') : '';
    const tabKey = x.job.stage==='finishing'?'finish':x.job.stage==='inspection'?'insp':x.job.stage==='moulding'?'mould':'pdi';
    return `<tr class="jr" onclick="spt('${tabKey}')">
      <td>${emBadge(x.job)}<span style="color:#0A6ED1;font-weight:600">${x.job.id}</span></td>
      <td>${x.job.product}</td><td>${x.job.customer}</td>
      <td><span class="b bif">${x.job.stage.charAt(0).toUpperCase()+x.job.stage.slice(1)}</span></td>
      <td>${x.job.qty.toLocaleString()} pcs &middot; ${(x.job.qtyDone||0).toLocaleString()} done</td>
      <td style="font-size:11px">${x.remHrs.toFixed(1)} hrs</td>
      <td style="font-size:11px">${projStr}</td>
      <td class="${lsdClass(x.job.promised)}">${fmtDate(x.job.promised)}</td>
      <td>${bufStr}</td>
      <td>${riskLabel}${otNote}</td>
    </tr>`;
  }).join('');

  const impactTable = `<div class="tc">
    <div class="tc-hd">
      <i class="ti ti-chart-bar" style="color:#6A6D70;font-size:14px"></i>
      <span class="tc-tt">OTD Impact &mdash; Today's WIP</span>
      <span class="tc-ct">Recalculates when attendance or hours change &middot; click row to jump to that stage</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Job</th><th>Product</th><th>Customer</th><th>Stage</th><th>Qty</th><th>Rem. TAT</th><th>Proj. End</th><th>Promised</th><th>Buffer</th><th>Risk &amp; Action</th></tr></thead>
      <tbody>${impactRows||'<tr><td colspan="10" style="text-align:center;color:#6A6D70;padding:20px">No active WIP jobs</td></tr>'}</tbody>
    </table></div>
  </div>`;

  return `<div id="shift-brief-wrap">${summaryCards}${attendancePanel}${impactTable}</div>`;
}



// Re-render dashboard now that everything is wired and data is defined
updateAllCounts();
nav('dashboard', 'Dashboard');

</script>
</body>
</html>
